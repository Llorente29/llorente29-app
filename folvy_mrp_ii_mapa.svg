<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="860" viewBox="0 0 1180 860" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="mrpar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9a8c78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1180" height="860" rx="18" fill="#faf7f2"/>

  <!-- título -->
  <text x="40" y="50" font-size="26" font-weight="700" fill="#3d2c1e">Folvy — MRP II de ciclo cerrado</text>
  <text x="40" y="76" font-size="14" fill="#8a7a66">El destino del aprovisionamiento: SAP/Oracle con cara de app, para hostelería. 13 fases · construir por capas, este es el plano.</text>

  <!-- leyenda -->
  <g font-size="12.5">
    <rect x="40" y="92" width="16" height="16" rx="3" fill="#d9f0e6" stroke="#1d9e75"/>
    <text x="63" y="105" fill="#3d2c1e">construido</text>
    <rect x="172" y="92" width="16" height="16" rx="3" fill="#fbeeda" stroke="#ba7517"/>
    <text x="195" y="105" fill="#3d2c1e">a medias</text>
    <rect x="288" y="92" width="16" height="16" rx="3" fill="#fbe3d8" stroke="#d85a30"/>
    <text x="311" y="105" fill="#3d2c1e">insumo verde / vacío</text>
    <rect x="470" y="92" width="16" height="16" rx="3" fill="#efeae3" stroke="#888780"/>
    <text x="493" y="105" fill="#3d2c1e">por construir</text>
  </g>

  <!-- ===== PLANIFICACIÓN ===== -->
  <text x="40" y="148" font-size="15" font-weight="700" fill="#9c4a1a">PLANIFICACIÓN · el cerebro — nadie en hostelería lo tiene</text>

  <!-- 1 prevision (insumo verde) -->
  <rect x="40" y="160" width="205" height="74" rx="11" fill="#fbe3d8" stroke="#d85a30" stroke-width="1.1"/>
  <text x="54" y="182" font-size="13" font-weight="700" fill="#a8431d">1 · Previsión demanda</text>
  <text x="54" y="201" font-size="11" fill="#7a5340">~12K ventas + estacionalidad</text>
  <text x="54" y="218" font-size="11" fill="#7a5340">IA diferencial · insumo verde</text>

  <!-- 2 MPS -->
  <rect x="262" y="160" width="205" height="74" rx="11" fill="#efeae3" stroke="#888780" stroke-width="1.1"/>
  <text x="276" y="182" font-size="13" font-weight="700" fill="#5a5550">2 · Plan maestro (MPS)</text>
  <text x="276" y="201" font-size="11" fill="#6a655e">qué y cuánto se produce</text>
  <text x="276" y="218" font-size="11" fill="#6a655e">por construir</text>

  <!-- 3 MRP (insumo verde) -->
  <rect x="484" y="160" width="205" height="74" rx="11" fill="#fbe3d8" stroke="#d85a30" stroke-width="1.1"/>
  <text x="498" y="182" font-size="13" font-weight="700" fill="#a8431d">3 · Explosión MRP</text>
  <text x="498" y="201" font-size="11" fill="#7a5340">plato→escandallo→materias</text>
  <text x="498" y="218" font-size="11" fill="#7a5340">con merma (gross) · insumo verde</text>

  <!-- 4 balance -->
  <rect x="706" y="160" width="205" height="74" rx="11" fill="#efeae3" stroke="#888780" stroke-width="1.1"/>
  <text x="720" y="182" font-size="13" font-weight="700" fill="#5a5550">4 · Balance vs stock</text>
  <text x="720" y="201" font-size="11" fill="#6a655e">necesidad − stock − pedidos</text>
  <text x="720" y="218" font-size="11" fill="#6a655e">por construir</text>

  <!-- 5 CRP -->
  <rect x="928" y="160" width="205" height="74" rx="11" fill="#efeae3" stroke="#888780" stroke-width="1.1"/>
  <text x="942" y="182" font-size="13" font-weight="700" fill="#5a5550">5 · Capacidad (CRP)</text>
  <text x="942" y="201" font-size="11" fill="#6a655e">¿cocina/personal da abasto?</text>
  <text x="942" y="218" font-size="11" fill="#6a655e">por construir · liga Horarios</text>

  <!-- ===== EJECUCIÓN DE COMPRA ===== -->
  <text x="40" y="278" font-size="15" font-weight="700" fill="#9c4a1a">EJECUCIÓN DE COMPRA · ciclo administrativo PO → albarán → factura</text>

  <!-- 6 ordenes -->
  <rect x="40" y="290" width="266" height="80" rx="11" fill="#fbeeda" stroke="#ba7517" stroke-width="1.1"/>
  <text x="54" y="312" font-size="13" font-weight="700" fill="#9a6212">6 · Órdenes de compra</text>
  <text x="54" y="331" font-size="11" fill="#7a5a32">PEDIDO manual sobre catalogo ✓</text>
  <text x="54" y="348" font-size="11" fill="#7a5a32">multi-local · PDF · nº PED-</text>
  <text x="54" y="364" font-size="11" fill="#7a5a32">generación automática: por construir</text>

  <!-- 7 aprobacion+envio -->
  <rect x="323" y="290" width="266" height="80" rx="11" fill="#fbeeda" stroke="#ba7517" stroke-width="1.1"/>
  <text x="337" y="312" font-size="13" font-weight="700" fill="#9a6212">7 · Aprobación + envío</text>
  <text x="337" y="331" font-size="11" fill="#7a5a32">aprobación por reglas (factura) ✓</text>
  <text x="337" y="348" font-size="11" fill="#7a5a32">envío al proveedor email/WhatsApp:</text>
  <text x="337" y="364" font-size="11" fill="#7a5a32">por construir</text>

  <!-- 8 recepcion CONSTRUIDA -->
  <rect x="606" y="290" width="266" height="80" rx="11" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.4"/>
  <text x="620" y="312" font-size="13" font-weight="700" fill="#137a57">8 · Recepción (albarán) ✓</text>
  <text x="620" y="331" font-size="11" fill="#1f6e47">stock WAC perpetuo · anti-error</text>
  <text x="620" y="348" font-size="11" fill="#1f6e47">OCR C2.2: lee→casa(memoria)→crea→</text>
  <text x="620" y="364" font-size="11" fill="#1f6e47">aprende→avisos. Supera a MarketMan</text>

  <!-- 9 factura CONSTRUIDA -->
  <rect x="889" y="290" width="244" height="80" rx="11" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.4"/>
  <text x="903" y="312" font-size="13" font-weight="700" fill="#137a57">9 · Factura + 3-way ✓</text>
  <text x="903" y="331" font-size="11" fill="#1f6e47">C3.1–C3.5 · OCR + three-way</text>
  <text x="903" y="348" font-size="11" fill="#1f6e47">+ eslabón coste→margen + aprob.</text>
  <text x="903" y="364" font-size="11" fill="#1f6e47">iguala R365, supera · probar en vivo</text>

  <!-- flechas 6→7→8→9 -->
  <line x1="306" y1="330" x2="321" y2="330" stroke="#9a8c78" stroke-width="1.5" marker-end="url(#mrpar)"/>
  <line x1="589" y1="330" x2="604" y2="330" stroke="#9a8c78" stroke-width="1.5" marker-end="url(#mrpar)"/>
  <line x1="872" y1="330" x2="887" y2="330" stroke="#9a8c78" stroke-width="1.5" marker-end="url(#mrpar)"/>

  <!-- ===== INVENTARIO, COSTE Y CIERRE ===== -->
  <text x="40" y="414" font-size="15" font-weight="700" fill="#9c4a1a">INVENTARIO, COSTE Y CIERRE · el bucle que se cierra</text>

  <!-- 10 inventario EL TRONCO - siguiente frente -->
  <rect x="40" y="426" width="350" height="96" rx="12" fill="#fbe3d8" stroke="#d85a30" stroke-width="2"/>
  <text x="56" y="450" font-size="14" font-weight="700" fill="#a8431d">10 · Inventario perpetuo — EL TRONCO</text>
  <text x="56" y="470" font-size="11.5" fill="#7a5340">entradas (recepción ✓) − salidas (ventas×escandallo)</text>
  <text x="56" y="487" font-size="11.5" fill="#7a5340">= stock en tiempo real por local. Conteos, mermas,</text>
  <text x="56" y="504" font-size="11.5" fill="#7a5340">caducidades, FEFO. De aquí cuelga casi todo.</text>
  <rect x="250" y="426" width="140" height="22" rx="11" fill="#d85a30"/>
  <text x="320" y="441" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">SIGUIENTE FRENTE</text>

  <!-- 11 trazabilidad a medias -->
  <rect x="406" y="426" width="222" height="96" rx="12" fill="#fbeeda" stroke="#ba7517" stroke-width="1.1"/>
  <text x="420" y="450" font-size="13" font-weight="700" fill="#9a6212">11 · Trazabilidad lote</text>
  <text x="420" y="470" font-size="11" fill="#7a5a32">lote→ración→plato→cliente</text>
  <text x="420" y="487" font-size="11" fill="#7a5a32">APPCC (Safety) + QA emplatado</text>
  <text x="420" y="504" font-size="11" fill="#7a5a32">por visión IA · a medias</text>

  <!-- 12 AvT motor verde -->
  <rect x="644" y="426" width="222" height="96" rx="12" fill="#fbeeda" stroke="#ba7517" stroke-width="1.1"/>
  <text x="658" y="450" font-size="13" font-weight="700" fill="#9a6212">12 · Coste real vs teórico</text>
  <text x="658" y="470" font-size="11" fill="#7a5a32">AvT — la métrica reina</text>
  <text x="658" y="487" font-size="11" fill="#7a5a32">teórico (escandallo×ventas) vs</text>
  <text x="658" y="504" font-size="11" fill="#7a5a32">real · motor verde, dato pendiente</text>

  <!-- 13 cierre -->
  <rect x="882" y="426" width="251" height="96" rx="12" fill="#efeae3" stroke="#888780" stroke-width="1.1"/>
  <text x="896" y="450" font-size="13" font-weight="700" fill="#5a5550">13 · Cierre + márgenes</text>
  <text x="896" y="470" font-size="11" fill="#6a655e">la cima de la torre del coste</text>
  <text x="896" y="487" font-size="11" fill="#6a655e">márgenes reales por período</text>
  <text x="896" y="504" font-size="11" fill="#6a655e">por construir</text>

  <!-- flecha cierre realimenta prevision -->
  <path d="M1008 522 L1008 560 L150 560 L150 236" fill="none" stroke="#c8703a" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#mrpar)"/>
  <text x="520" y="554" font-size="12" font-style="italic" fill="#9c4a1a">el cierre realimenta la previsión → ciclo cerrado</text>

  <!-- método -->
  <rect x="40" y="600" width="1093" height="64" rx="12" fill="#f1ece4" stroke="#b0a08c" stroke-width="1"/>
  <text x="56" y="624" font-size="13" font-weight="700" fill="#5a4a38">Método</text>
  <text x="56" y="644" font-size="11.5" fill="#5a4a38">Copiar conceptos estándar de ERP industrial (reorder point, safety stock, lead time, EOQ, BOM con scrap, three-way match, PAR, FEFO) y traducirlos a lenguaje de cocina.</text>
  <text x="56" y="660" font-size="11.5" fill="#5a4a38">Construir por capas pequeñas operativas, cada una usable sola, pero siempre con este mapa completo como destino. Cada capa enchufa como fuente/consumidor sin reescribir.</text>

  <!-- estado resumen -->
  <text x="40" y="694" font-size="13" font-weight="700" fill="#137a57">Construido (insumos + ejecución de compra)</text>
  <text x="40" y="713" font-size="11.5" fill="#5a4a38">escandallos (BOM) · ~12K ventas · ingredientes/proveedores/formatos/coste · familias AECOC · APPCC · QA emplatado · motor de coste · PEDIDO · RECEPCIÓN+OCR · FACTURA+three-way+eslabón coste.</text>
  <text x="40" y="740" font-size="13" font-weight="700" fill="#a8431d">Por construir (planificación + inventario + cierre)</text>
  <text x="40" y="759" font-size="11.5" fill="#5a4a38">inventario/stock perpetuo · lotes/caducidad (FEFO) · conteos · mermas · previsión (tabla) · plan maestro · balance · capacidad · generación automática de órdenes · cierre/márgenes.</text>

  <!-- nota benchmark -->
  <text x="40" y="792" font-size="13" font-weight="700" fill="#244e7e">El hueco de mercado</text>
  <text x="40" y="811" font-size="11.5" fill="#33485f">Apicbase/MarketMan/Toast se quedan en EJECUCIÓN (compras+inventario+food cost). La PLANIFICACIÓN (previsión→MPS→MRP→órdenes automáticas→ciclo cerrado con AvT) es</text>
  <text x="40" y="828" font-size="11.5" fill="#33485f">territorio de SAP/Oracle, inusables en hostelería. Folvy = ese cerebro con cara de app. Las fases 8 y 9 ya construidas son el primer eslabón sólido del ciclo administrativo.</text>

  <text x="40" y="852" font-size="10.5" fill="#9a8c78">folvy_mrp_ii_mapa.svg · regenerado 2026-06-04 (factura C3 completa C3.1–C3.5) · versionable, no binario</text>
</svg>
