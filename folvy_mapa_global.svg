<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="880" viewBox="0 0 1180 880" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="gar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9a8c78" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1180" height="880" rx="18" fill="#faf7f2"/>

  <text x="40" y="50" font-size="26" font-weight="700" fill="#3d2c1e">Folvy — mapa global</text>
  <text x="40" y="76" font-size="14" fill="#8a7a66">Vista de pájaro por zonas y estado real, para decidir frentes con contexto completo. Se regenera desde la fuente primaria (BBDD+repo).</text>

  <!-- leyenda -->
  <g font-size="12.5">
    <rect x="40" y="92" width="16" height="16" rx="3" fill="#d9f0e6" stroke="#1d9e75"/>
    <text x="63" y="105" fill="#3d2c1e">construido</text>
    <rect x="172" y="92" width="16" height="16" rx="3" fill="#fbeeda" stroke="#ba7517"/>
    <text x="195" y="105" fill="#3d2c1e">a medias</text>
    <rect x="288" y="92" width="16" height="16" rx="3" fill="#fbe3d8" stroke="#d85a30"/>
    <text x="311" y="105" fill="#3d2c1e">vacío de datos</text>
    <rect x="430" y="92" width="16" height="16" rx="3" fill="#efeae3" stroke="#888780"/>
    <text x="453" y="105" fill="#3d2c1e">pendiente / bloqueado</text>
  </g>

  <!-- ===== ENTRADA DE DATOS ===== -->
  <text x="40" y="146" font-size="15" font-weight="700" fill="#9c4a1a">ENTRADA DE DATOS</text>
  <rect x="40" y="156" width="262" height="66" rx="10" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.2"/>
  <text x="54" y="178" font-size="12.5" font-weight="700" fill="#137a57">Last.app (POS) ✓</text>
  <text x="54" y="196" font-size="10.5" fill="#1f6e47">webhook en vivo, captura fiscal</text>
  <text x="54" y="212" font-size="10.5" fill="#1f6e47">deploy SIEMPRE --no-verify-jwt</text>

  <rect x="316" y="156" width="262" height="66" rx="10" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.2"/>
  <text x="330" y="178" font-size="12.5" font-weight="700" fill="#137a57">Ingesta de ventas ✓</text>
  <text x="330" y="196" font-size="10.5" fill="#1f6e47">entran solas · backfill histórico</text>
  <text x="330" y="212" font-size="10.5" fill="#1f6e47">~12K ventas</text>

  <rect x="592" y="156" width="262" height="66" rx="10" fill="#fbeeda" stroke="#ba7517" stroke-width="1.1"/>
  <text x="606" y="178" font-size="12.5" font-weight="700" fill="#9a6212">Folvy Connect · conectores</text>
  <text x="606" y="196" font-size="10.5" fill="#7a5a32">modelo+pantallas+Vault ✓</text>
  <text x="606" y="212" font-size="10.5" fill="#7a5a32">Glovo sembrado, Catcher esperando</text>

  <rect x="868" y="156" width="265" height="66" rx="10" fill="#efeae3" stroke="#888780" stroke-width="1.1"/>
  <text x="882" y="178" font-size="12.5" font-weight="700" fill="#5a5550">Plataformas delivery</text>
  <text x="882" y="196" font-size="10.5" fill="#6a655e">Glovo BLOQUEADO (INTSUPPO-1382)</text>
  <text x="882" y="212" font-size="10.5" fill="#6a655e">Folvy = integrador directo</text>

  <!-- ===== KITCHEN: torre del coste → margen ===== -->
  <rect x="40" y="240" width="1093" height="316" rx="14" fill="#fff" stroke="#c8703a" stroke-width="1.5"/>
  <text x="56" y="266" font-size="16" font-weight="700" fill="#9c4a1a">KITCHEN · torre del coste → margen  (frente vivo)</text>
  <text x="56" y="286" font-size="11.5" fill="#8a7a66">La cadena que convierte compra real en margen real. Motor construido y validado con dato real; falta cargar precios de los raws y subir las capas altas.</text>

  <!-- fila 1: datos maestros -->
  <rect x="56" y="298" width="250" height="74" rx="10" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.2"/>
  <text x="68" y="319" font-size="12" font-weight="700" fill="#137a57">Proveedores/artículos/formato ✓</text>
  <text x="68" y="336" font-size="10.5" fill="#1f6e47">validado E2E (MAKRO 0,0017€/g)</text>
  <text x="68" y="352" font-size="10.5" fill="#1f6e47">UI lenguaje de cocinero · cálculo vivo</text>
  <text x="68" y="367" font-size="10.5" fill="#a8431d">pocos raws con precio real aún</text>

  <rect x="320" y="298" width="232" height="74" rx="10" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.2"/>
  <text x="332" y="319" font-size="12" font-weight="700" fill="#137a57">Coste raw + escandallo ✓</text>
  <text x="332" y="336" font-size="10.5" fill="#1f6e47">recompute + trigger · una verdad</text>
  <text x="332" y="352" font-size="10.5" fill="#1f6e47">validado al céntimo</text>
  <text x="332" y="367" font-size="10.5" fill="#1f6e47">SUM(líneas)=computed_cost</text>

  <rect x="566" y="298" width="232" height="74" rx="10" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.2"/>
  <text x="578" y="319" font-size="12" font-weight="700" fill="#137a57">Familias ingrediente ✓</text>
  <text x="578" y="336" font-size="10.5" fill="#1f6e47">15 familias AECOC · jerarquía</text>
  <text x="578" y="352" font-size="10.5" fill="#1f6e47">clasificación IA 106+56 · 0 sin fam.</text>
  <text x="578" y="367" font-size="10.5" fill="#1f6e47">CRUD completo · IA-propone</text>

  <rect x="812" y="298" width="305" height="74" rx="10" fill="#fbeeda" stroke="#ba7517" stroke-width="1.1"/>
  <text x="824" y="319" font-size="12" font-weight="700" fill="#9a6212">Ventas / consumo teórico</text>
  <text x="824" y="336" font-size="10.5" fill="#7a5a32">hay dato de ventas</text>
  <text x="824" y="352" font-size="10.5" fill="#7a5a32">consumo teórico (ventas×escandallo)</text>
  <text x="824" y="367" font-size="10.5" fill="#7a5a32">por explotar · a medias</text>

  <!-- fila 2: SUPPLY destacado -->
  <rect x="56" y="382" width="540" height="86" rx="11" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.6"/>
  <text x="68" y="404" font-size="13" font-weight="700" fill="#137a57">Folvy Supply (módulo de PROCESO) ✓ — ciclo de compra cerrado</text>
  <text x="68" y="423" font-size="10.5" fill="#1f6e47">Pedido (PED, sobre catálogo, multi-local, PDF) · Recepción (ALB) + stock WAC perpetuo ·</text>
  <text x="68" y="439" font-size="10.5" fill="#1f6e47">OCR C2.2 (lee→casa con memoria→crea→aprende→avisos; supera a MarketMan) ·</text>
  <text x="68" y="455" font-size="10.5" fill="#137a57" font-weight="700">FACTURA C3 ✓ (C3.1–C3.5: OCR + three-way + eslabón coste→margen + aprobación). Probar en vivo.</text>

  <!-- fila 2: inventario + AvT + margen -->
  <rect x="610" y="382" width="170" height="86" rx="11" fill="#fbe3d8" stroke="#d85a30" stroke-width="1.4"/>
  <text x="622" y="404" font-size="12" font-weight="700" fill="#a8431d">Inventario perpetuo</text>
  <text x="622" y="422" font-size="10" fill="#7a5340">EL TRONCO · vacío</text>
  <text x="622" y="437" font-size="10" fill="#7a5340">recepción ya escribe</text>
  <text x="622" y="452" font-size="10" fill="#7a5340">stock_movement+WAC</text>
  <text x="622" y="462" font-size="9.5" font-style="italic" fill="#a8431d">SIGUIENTE FRENTE</text>

  <rect x="792" y="382" width="155" height="86" rx="11" fill="#efeae3" stroke="#888780" stroke-width="1.1"/>
  <text x="804" y="404" font-size="12" font-weight="700" fill="#5a5550">AvT / mermas</text>
  <text x="804" y="422" font-size="10" fill="#6a655e">teórico vs real</text>
  <text x="804" y="437" font-size="10" fill="#6a655e">ingrediente a ingr.</text>
  <text x="804" y="452" font-size="10" fill="#6a655e">necesita inventario</text>

  <rect x="959" y="382" width="158" height="86" rx="11" fill="#efeae3" stroke="#888780" stroke-width="1.1"/>
  <text x="971" y="404" font-size="12" font-weight="700" fill="#5a5550">Margen real</text>
  <text x="971" y="422" font-size="10" fill="#6a655e">la cima · 3 patas:</text>
  <text x="971" y="437" font-size="10" fill="#6a655e">coste + comisión +</text>
  <text x="971" y="452" font-size="10" fill="#6a655e">transporte real</text>

  <!-- flujo de coste -->
  <rect x="56" y="478" width="1061" height="62" rx="10" fill="#fff3e8" stroke="#c8703a" stroke-width="1"/>
  <text x="72" y="500" font-size="12" font-weight="700" fill="#9c4a1a">El bucle del coste real (ganado vs MarketMan/xtraCHEF)</text>
  <text x="72" y="519" font-size="10.5" fill="#7a5340">OCR de recepción casa líneas con ingrediente (run_mapping) → la factura C3 confirma/corrige last_price → recompute del raw → cascada al plato → impacto en margen.</text>
  <text x="72" y="534" font-size="10.5" fill="#7a5340">Memoria por proveedor + copiloto + revisión nativa + factura conectada al margen: nadie más lo cierra. Motor de IVA versionado por fecha (normativa ES).</text>

  <!-- ===== TRANSVERSALES ===== -->
  <text x="40" y="576" font-size="15" font-weight="700" fill="#9c4a1a">TRANSVERSALES</text>
  <rect x="40" y="586" width="262" height="62" rx="10" fill="#fbeeda" stroke="#ba7517" stroke-width="1.1"/>
  <text x="54" y="607" font-size="12" font-weight="700" fill="#9a6212">Folvy AI</text>
  <text x="54" y="624" font-size="10.5" fill="#7a5a32">SSE+tool-use+memoria · extract-recipe</text>
  <text x="54" y="640" font-size="10.5" fill="#7a5a32">map-products · patrón reutilizable</text>

  <rect x="316" y="586" width="262" height="62" rx="10" fill="#fbeeda" stroke="#ba7517" stroke-width="1.1"/>
  <text x="330" y="607" font-size="12" font-weight="700" fill="#9a6212">Vigilante de ingesta</text>
  <text x="330" y="624" font-size="10.5" fill="#7a5a32">capas 2+3 ✓ (ping+watchdog)</text>
  <text x="330" y="640" font-size="10.5" fill="#7a5a32">capa 1 (horario) = deuda Horarios</text>

  <rect x="592" y="586" width="262" height="62" rx="10" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.2"/>
  <text x="606" y="607" font-size="12" font-weight="700" fill="#137a57">Ingeniería de menús ✓</text>
  <text x="606" y="624" font-size="10.5" fill="#1f6e47">menu_item_economics</text>
  <text x="606" y="640" font-size="10.5" fill="#1f6e47">comisión a fuente única</text>

  <rect x="868" y="586" width="265" height="62" rx="10" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.2"/>
  <text x="882" y="607" font-size="12" font-weight="700" fill="#137a57">Team · Safety · Sales · Portal ✓</text>
  <text x="882" y="624" font-size="10.5" fill="#1f6e47">APPCC, fichajes, inicio adaptativo</text>
  <text x="882" y="640" font-size="10.5" fill="#a8431d">portal worker: recibir = DEUDA</text>

  <!-- ===== CIMIENTO ===== -->
  <rect x="40" y="666" width="1093" height="56" rx="11" fill="#d9f0e6" stroke="#1d9e75" stroke-width="1.4"/>
  <text x="56" y="690" font-size="13" font-weight="700" fill="#137a57">CIMIENTO ✓ — Shell · Auth (PKCE) · Admin · Multi-tenant RLS · Folvy Connect (Vault)</text>
  <text x="56" y="710" font-size="10.5" fill="#1f6e47">en producción. Arquitectura modular: añadir módulo = añadir línea en moduleRegistry.ts.</text>

  <!-- cuentas -->
  <rect x="40" y="740" width="1093" height="56" rx="11" fill="#f1ece4" stroke="#b0a08c" stroke-width="1"/>
  <text x="56" y="763" font-size="12.5" font-weight="700" fill="#5a4a38">Cuentas (CRÍTICO)</text>
  <text x="56" y="782" font-size="10.5" fill="#5a4a38">Folvy Interno (0000…0001) = BANCO DE PRUEBAS (todo el trabajo real: 162 raws, 215 dishes, ~12K ventas). · Llorente29 (51ad1792-…) = CLIENTE REAL, hoy VACÍO, se poblará migrando.</text>

  <!-- deuda destacada -->
  <rect x="40" y="812" width="1093" height="44" rx="10" fill="#fbeeda" stroke="#ba7517" stroke-width="1.2"/>
  <text x="56" y="831" font-size="12" font-weight="700" fill="#9a6212">DEUDA IMPORTANTE — recepción desde portal del trabajador (no construida)</text>
  <text x="56" y="848" font-size="10.5" fill="#7a5a32">Supply hoy gateado a manager. Falta recibir desde el portal del worker → borrador → oficina valida + cámara in situ + roles. Disparador: antes de producción.</text>

  <text x="40" y="872" font-size="10.5" fill="#9a8c78">folvy_mapa_global.svg · regenerado 2026-06-04 (factura C3 completa C3.1–C3.5) · versionable, no binario</text>
</svg>
