  <text x="36" y="296" font-size="11.5" fill="#5f5e5a">Datos hoy: 1/162 raws con precio real de proveedor (Cebolla Morada → 0,0017€/g, 36 platos recalculados). Resto en fixed_cost (andamiaje).</text>
  <text x="36" y="316" font-size="11.5" fill="#5f5e5a">Pendiente del frente: cargar los 162 (IA factura→coste) · clasificar en familias (55 existen, 0 raws) · catálogo estándar onboarding.</text>
  <text x="36" y="336" font-size="11.5" fill="#993c1d">Para llegar al MARGEN faltan 2 patas más: comisión real (Pantalla Canales, pend.) y transporte real (Catcher/Jelp, pend.).</text>
  <text x="36" y="356" font-size="11.5" fill="#5f5e5a">Cascada de coste a platos: VIVA. Coste por local: existe. run_mapping (mapeo IA): existe. Helpers IA de cocina: existen.</text>
  <text x="36" y="382" font-size="11.5" font-style="italic" fill="#888780">El motor está; el combustible (datos reales de compra) es lo que falta. Esta zona NO está verde por construir, sino por poblar.</text>

